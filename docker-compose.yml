services:
  cis-assessment:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cis-assessment
    restart: unless-stopped
    ports:
      - "${PORT:-8080}:8080"
    volumes:
      - cis_data:/app/data
    environment:
      DB_PATH: /app/data/cis_assessment.db
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  cis_data:
    driver: local
